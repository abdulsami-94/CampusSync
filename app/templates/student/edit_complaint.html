{% extends "base.html" %}
{% block content %}
<div style="max-width: 700px; margin: 0 auto;">
    <div class="card">
        <div class="card-body">
            <h2 style="margin-bottom: 32px;">Edit Complaint</h2>
            <form method="POST" action="" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <div class="form-group">
                    <label for="title">Subject/Title</label>
                    <input type="text" id="title" name="title" value="{{ complaint.title }}" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
                    <div>
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                            <option value="Wi-Fi / Internet" {% if complaint.category=='Wi-Fi / Internet' %}selected{% endif %}>Wi-Fi / Internet</option>
                            <option value="Classrooms" {% if complaint.category=='Classrooms' %}selected{% endif %}>Classrooms</option>
                            <option value="Computer Labs" {% if complaint.category=='Computer Labs' %}selected{% endif %}>Computer Labs</option>
                            <option value="Canteen" {% if complaint.category=='Canteen' %}selected{% endif %}>Canteen</option>
                            <option value="Washrooms" {% if complaint.category=='Washrooms' %}selected{% endif %}>Washrooms</option>
                            <option value="Library" {% if complaint.category=='Library' %}selected{% endif %}>Library</option>
                            <option value="Hostel" {% if complaint.category=='Hostel' %}selected{% endif %}>Hostel</option>
                            <option value="Sports Facilities" {% if complaint.category=='Sports Facilities' %}selected{% endif %}>Sports Facilities</option>
                            <option value="Electricity" {% if complaint.category=='Electricity' %}selected{% endif %}>Electricity</option>
                            <option value="Other" {% if complaint.category=='Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                    <div>
                        <label for="priority">Priority Level</label>
                        <select id="priority" name="priority">
                            <option value="Low" {% if complaint.priority=='Low' %}selected{% endif %}>Low</option>
                            <option value="Medium" {% if complaint.priority=='Medium' %}selected{% endif %}>Medium</option>
                            <option value="High" {% if complaint.priority=='High' %}selected{% endif %}>High</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="location">Location Details</label>
                    <input type="text" id="location" name="location" value="{{ complaint.location }}" required>
                </div>

                <div class="form-group">
                    <label for="description">Detailed Description</label>
                    <textarea id="description" name="description" rows="5" required>{{ complaint.description }}</textarea>
                </div>

                <div class="form-group">
                    <label for="image">Update Image (Optional)</label>
                    <input type="file" id="image" name="image" accept="image/png, image/jpeg, image/jpg">
                    <small style="color: var(--mid); font-size: 0.85rem; display: block; margin-top: 8px;">Current image: {{ complaint.image_file if complaint.image_file else 'None' }}</small>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px;">
                    <a href="{{ url_for('student.dashboard') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Update Complaint</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
