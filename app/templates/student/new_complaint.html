{% extends "base.html" %}
{% block content %}
<div style="max-width: 700px; margin: 0 auto;">
    <div class="card">
        <div class="card-body">
            <h2 style="margin-bottom: 32px;">Register a New Complaint</h2>
            <form method="POST" action="" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <div class="form-group">
                    <label for="title">Subject/Title</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
                    <div>
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                            <option value="" disabled selected>Select a category</option>
                            <option value="Wi-Fi / Internet">Wi-Fi / Internet</option>
                            <option value="Classrooms">Classrooms</option>
                            <option value="Computer Labs">Computer Labs</option>
                            <option value="Canteen">Canteen</option>
                            <option value="Washrooms">Washrooms</option>
                            <option value="Library">Library</option>
                            <option value="Hostel">Hostel</option>
                            <option value="Sports Facilities">Sports Facilities</option>
                            <option value="Electricity">Electricity</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label for="priority">Priority Level</label>
                        <select id="priority" name="priority">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="location">Location Details</label>
                    <input type="text" id="location" name="location" placeholder="Street, Building, etc." required>
                </div>

                <div class="form-group">
                    <label for="description">Detailed Description</label>
                    <textarea id="description" name="description" rows="5" required></textarea>
                </div>

                <div class="form-group">
                    <label for="image">Evidence Image (Optional)</label>
                    <input type="file" id="image" name="image" accept="image/png, image/jpeg, image/jpg">
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px;">
                    <a href="{{ url_for('student.dashboard') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Submit Complaint</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
