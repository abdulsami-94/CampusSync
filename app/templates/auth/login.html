{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 64px);">
    <div style="width: 100%; max-width: 420px;">
        <div class="card">
            <div class="card-body">
                <h2 style="margin-bottom: 32px; text-align: center;">Login to CampusSync</h2>
                <form method="POST" action="">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div style="display: flex; align-items: center; margin-bottom: 24px;">
                        <input type="checkbox" id="remember" name="remember" style="width: auto; margin-right: 8px;">
                        <label for="remember" style="margin-bottom: 0; text-transform: none; font-size: 0.875rem; font-weight: 400; letter-spacing: 0;">Remember Me</label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-bottom: 16px;">Login</button>
                </form>
            </div>
            <div style="text-align: center; padding: 16px 32px; border-top: 1px solid var(--stone);">
                <small style="color: var(--mid); font-size: 0.85rem;">Need An Account? <a href="{{ url_for('auth.register') }}" style="color: var(--accent); text-decoration: none;">Sign Up</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
